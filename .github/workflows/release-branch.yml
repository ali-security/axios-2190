name: Version package (v0.x)

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Choose release type"
        required: true
        type: choice
        options:
          - patch
          - minor
        default: patch

jobs:
  ci:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        node-version: [12.x, 14.x, 16.x, 18.x, 20.x, 22.x, 24.x, 26.x]
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: v0.x
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Build project
        run: npm run build
      - name: Run tests
        run: npm run test

  bump-version-and-create-pr:
    name: Bump version and create PR v0.x
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: v0.x
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 26.x
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: NPM bump version
        id: bump
        run: |
          npm version ${{ inputs.version_type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "branch=release-v0x/version-$VERSION" >> "$GITHUB_OUTPUT"
      - name: Grunt version
        run: npm run preversion
      - name: Build project
        run: npm run build
      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to v${{ steps.bump.outputs.version }}"
          branch: ${{ steps.bump.outputs.branch }}
          base: v0.x
          title: "chore: release v${{ steps.bump.outputs.version }}"
          body: "Automated version bump to v${{ steps.bump.outputs.version }}."
          labels: |
            type::automated-pr
            priority::high
            commit::chore
