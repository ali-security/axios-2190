name: Continuous integration (v0.x)

on:
  push:
    branches: [ '**' ]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [12.x, 14.x, 16.x, 18.x, 20.x, 22.x, 24.x]
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          persist-credentials: true
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Run tests
        run: |
          attempts=10
          for i in $(seq 1 $attempts); do
            sleep $((RANDOM % 5 + 1))
            echo "::group::Test attempt $i/$attempts"
            if npm run test; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Tests failed on attempt $i/$attempts."
          done
          echo "Tests failed after $attempts attempts."
          exit 1
